<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CodexPet Demo</title>
    <style>
      :root {
        --ink: #161719;
        --paper: #f4f0e8;
        --panel: #fffaf0;
        --navy: #112b59;
        --blue: #1f54a3;
        --violet: #bba5ff;
        --gold: #e5a12f;
        --line: #221f1a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        color: var(--ink);
        font-family: Georgia, "Times New Roman", serif;
        background:
          linear-gradient(90deg, rgba(34, 31, 26, 0.06) 1px, transparent 1px),
          linear-gradient(rgba(34, 31, 26, 0.06) 1px, transparent 1px),
          var(--paper);
        background-size: 26px 26px;
      }

      main {
        width: min(1120px, calc(100vw - 32px));
        min-height: 100vh;
        margin: 0 auto;
        display: grid;
        grid-template-columns: minmax(280px, 420px) minmax(300px, 1fr);
        align-items: center;
        gap: 56px;
        padding: 48px 0;
      }

      .stage {
        position: relative;
        min-height: 560px;
        display: grid;
        place-items: center;
        overflow: hidden;
        border: 4px solid var(--line);
        background:
          linear-gradient(135deg, rgba(229, 161, 47, 0.18), transparent 44%),
          linear-gradient(315deg, rgba(187, 165, 255, 0.22), transparent 48%),
          #fffdf7;
        box-shadow: 12px 12px 0 var(--line);
      }

      .stage::before {
        content: "";
        position: absolute;
        inset: 18px;
        border: 2px dashed rgba(34, 31, 26, 0.2);
        pointer-events: none;
      }

      .pet-track {
        width: min(72%, 310px);
        aspect-ratio: 192 / 208;
        transform-origin: center bottom;
        animation: bob 1.8s steps(2, end) infinite;
      }

      .pet-track.is-running {
        animation: bob 0.7s steps(2, end) infinite, roam 4.2s linear infinite;
      }

      .pet {
        width: 100%;
        height: 100%;
        background-image: url("../pets/codexpet/spritesheet.webp");
        background-repeat: no-repeat;
        background-size: 800% 900%;
        image-rendering: pixelated;
        filter: drop-shadow(10px 14px 0 rgba(17, 43, 89, 0.16));
      }

      @keyframes bob {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-10px);
        }
      }

      @keyframes roam {
        0% {
          translate: -42% 0;
        }
        49% {
          scale: 1 1;
        }
        50% {
          translate: 42% 0;
          scale: -1 1;
        }
        99% {
          scale: -1 1;
        }
        100% {
          translate: -42% 0;
          scale: 1 1;
        }
      }

      .content {
        display: grid;
        gap: 28px;
      }

      h1 {
        margin: 0;
        font-size: clamp(48px, 8vw, 94px);
        line-height: 0.9;
        letter-spacing: 0;
      }

      .tagline {
        max-width: 620px;
        margin: 0;
        font-size: 22px;
        line-height: 1.45;
      }

      .status {
        display: inline-flex;
        width: fit-content;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        border: 3px solid var(--line);
        background: var(--panel);
        font: 700 16px/1.2 ui-monospace, "SFMono-Regular", Menlo, monospace;
        box-shadow: 5px 5px 0 var(--line);
      }

      .status-dot {
        width: 13px;
        height: 13px;
        background: var(--gold);
        border: 2px solid var(--line);
      }

      .controls {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
      }

      button {
        min-height: 48px;
        border: 3px solid var(--line);
        background: var(--panel);
        color: var(--ink);
        font: 700 15px/1 ui-monospace, "SFMono-Regular", Menlo, monospace;
        cursor: pointer;
        box-shadow: 5px 5px 0 var(--line);
        transition:
          transform 120ms ease,
          box-shadow 120ms ease,
          background 120ms ease;
      }

      button:hover {
        transform: translate(2px, 2px);
        box-shadow: 3px 3px 0 var(--line);
      }

      button[aria-pressed="true"] {
        background: var(--navy);
        color: white;
      }

      .notes {
        display: grid;
        gap: 10px;
        padding-left: 0;
        margin: 0;
        list-style: none;
        font: 16px/1.5 ui-monospace, "SFMono-Regular", Menlo, monospace;
      }

      .notes li::before {
        content: ">";
        margin-right: 10px;
        color: var(--blue);
        font-weight: 900;
      }

      @media (max-width: 820px) {
        main {
          grid-template-columns: 1fr;
          gap: 32px;
          padding: 24px 0 40px;
        }

        .stage {
          min-height: 420px;
        }

        .pet-track {
          width: min(68%, 250px);
        }

        .controls {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="stage" aria-label="CodexPet preview">
        <div id="petTrack" class="pet-track">
          <div id="pet" class="pet" role="img" aria-label="CodexPet idle state"></div>
        </div>
      </section>

      <section class="content">
        <div>
          <h1>CodexPet</h1>
          <p class="tagline">
            一个从你的像素商务人物延展出来的 Q 版陪伴角色，可用于桌面宠物、App
            助手、网页提示和任务反馈。
          </p>
        </div>

        <div class="status" aria-live="polite">
          <span class="status-dot" aria-hidden="true"></span>
          <span id="stateLabel">idle</span>
        </div>

        <div class="controls" aria-label="CodexPet states">
          <button type="button" data-state="idle" aria-pressed="true">idle</button>
          <button type="button" data-state="wave" aria-pressed="false">wave</button>
          <button type="button" data-state="thinking" aria-pressed="false">thinking</button>
          <button type="button" data-state="run" aria-pressed="false">run</button>
          <button type="button" data-state="jump" aria-pressed="false">jump</button>
          <button type="button" data-state="crouch" aria-pressed="false">crouch</button>
          <button type="button" data-state="point" aria-pressed="false">point</button>
          <button type="button" data-state="celebrate" aria-pressed="false">celebrate</button>
        </div>

        <ul class="notes">
          <li>8 个透明 PNG 状态已经切好</li>
          <li>原始 sprite sheet 和预览图保留在素材目录</li>
          <li>状态映射可直接迁移到 React、Vue、Expo 或原生网页</li>
        </ul>
      </section>
    </main>

    <script>
      const pet = document.querySelector("#pet");
      const petTrack = document.querySelector("#petTrack");
      const stateLabel = document.querySelector("#stateLabel");
      const buttons = [...document.querySelectorAll("[data-state]")];
      const stateRows = {
        idle: 0,
        run: 1,
        wave: 3,
        jump: 4,
        crouch: 5,
        thinking: 6,
        point: 8,
        celebrate: 4
      };

      let currentState = "idle";
      let frame = 0;
      let lastFrameAt = 0;

      function paintFrame() {
        const row = stateRows[currentState] ?? stateRows.idle;
        const x = (frame / 7) * 100;
        const y = (row / 8) * 100;
        pet.style.backgroundPosition = `${x}% ${y}%`;
        petTrack.classList.toggle("is-running", currentState === "run");
      }

      function animate(timestamp) {
        const interval = currentState === "run" ? 95 : 150;
        if (timestamp - lastFrameAt > interval) {
          frame = (frame + 1) % 8;
          lastFrameAt = timestamp;
          paintFrame();
        }
        requestAnimationFrame(animate);
      }

      buttons.forEach((button) => {
        button.addEventListener("click", () => {
          const state = button.dataset.state;
          currentState = state;
          frame = 0;
          pet.setAttribute("aria-label", `CodexPet ${state} state`);
          stateLabel.textContent = state;
          paintFrame();

          buttons.forEach((item) => {
            item.setAttribute("aria-pressed", String(item === button));
          });
        });
      });

      paintFrame();
      requestAnimationFrame(animate);
    </script>
  </body>
</html>
